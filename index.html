<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hádej vlajku!</title>
<style>
  :root {
    --bg: #eaf3ff;
    --card: #ffffff;
    --ink: #243352;
    --ok: #2ecc71;
    --ok-bg: #e3fbec;
    --bad: #ff6b6b;
    --bad-bg: #ffeaea;
    --blue: #3a7bd5;
    --yellow: #ffcb05;
    --line: #dce6f5;
    --gap: clamp(8px, 1.4vmin, 16px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--bg);
    height: 100dvh;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: max(8px, env(safe-area-inset-top)) clamp(8px, 2vw, 22px) max(8px, env(safe-area-inset-bottom));
    gap: var(--gap);
  }

  /* ---- kompaktní horní lišta ---- */
  .topbar { display: flex; align-items: center; gap: var(--gap); }

  /* celoobrazovkové tlačítko v levém horním rohu */
  .fs-btn {
    flex-shrink: 0;
    width: 54px; height: 54px;
    border: 3px solid var(--line);
    background: #fff; color: var(--ink);
    border-radius: 14px; cursor: pointer; transition: .12s;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(20px, 3vmin, 26px); line-height: 1;
  }
  .fs-btn:active { transform: scale(.95); background: #eaf2ff; }
  .modes { display: flex; gap: 8px; flex: 1; min-width: 0; }
  .mode-btn {
    flex: 1; min-width: 0;
    min-height: 54px;
    border: 3px solid var(--line);
    background: #fff; color: var(--ink);
    font-weight: 800; font-family: inherit;
    font-size: clamp(15px, 2.4vmin, 22px);
    border-radius: 14px; cursor: pointer; transition: .12s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mode-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  .score { display: flex; gap: 16px; flex-shrink: 0; font-size: clamp(20px, 3.2vmin, 30px); font-weight: 800; }
  .score .ok-s { color: var(--ok); }
  .score .bad-s { color: var(--bad); }

  /* ---- scéna ---- */
  .stage {
    min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: var(--gap); text-align: center;
  }
  .question { font-size: clamp(20px, 3.4vmin, 32px); font-weight: 800; line-height: 1; }

  /* obrázek vlajky (režim A) */
  .hero { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; width: 100%; }
  .flag-img {
    max-height: 100%; max-width: 100%; object-fit: contain;
    border: 1px solid rgba(0,0,0,.18);
    border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    background: #fff;
  }
  .hero .flag-img { height: 100%; }

  /* jméno (režim B) */
  .big-name-row {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
    gap: clamp(10px, 2vmin, 22px); flex-wrap: wrap;
  }
  .big-name {
    font-size: clamp(34px, 7.5vmin, 80px);
    font-weight: 800; color: var(--blue);
    line-height: 1.05; word-break: break-word;
  }
  .big-name-row .speaker {
    width: clamp(56px, 9vmin, 100px); height: clamp(56px, 9vmin, 100px);
    font-size: clamp(28px, 4.6vmin, 52px);
  }

  /* ---- odpovědi ---- */
  .answers.names { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); width: 100%; }
  .name-btn {
    font-family: inherit; font-weight: 800;
    font-size: clamp(17px, 2.9vmin, 34px);
    min-height: clamp(70px, 13vmin, 130px);
    padding: 8px 6px;
    border: 4px solid var(--line); background: #fff; color: var(--ink);
    border-radius: 20px; cursor: pointer; transition: .1s;
    overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; justify-content: center;
  }
  .name-btn:active:not(:disabled) { transform: scale(.97); }

  /* reproduktor */
  .speaker {
    border: none; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: #eaf2ff; color: var(--blue);
    line-height: 1; padding: 0; font-family: inherit;
  }
  .speaker:active { transform: scale(.95); background: #d6e6ff; }

  /* každá odpověď = tlačítko + oddělený reproduktor pod ním */
  .answer-cell { display: flex; flex-direction: column; gap: clamp(6px, 1.2vmin, 12px); }
  .answer-cell .name-btn { width: 100%; }
  .answer-cell .speaker {
    width: 100%;
    min-height: clamp(46px, 7vmin, 76px);
    border-radius: 16px; gap: 8px;
    font-size: clamp(18px, 2.8vmin, 26px); font-weight: 800;
  }
  .answer-cell .speaker .lbl { font-size: clamp(15px, 2.2vmin, 22px); }

  /* obrázkové odpovědi (vlajky) */
  .answers.images { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); width: 100%; flex: 1; min-height: 0; }
  .img-btn {
    border: 5px solid var(--line); background: #f7faff;
    border-radius: 20px; padding: 10px; cursor: pointer; transition: .1s;
    min-height: clamp(110px, 22vmin, 280px);
    display: flex; align-items: center; justify-content: center;
  }
  .img-btn:active:not(.disabled) { transform: scale(.97); }
  .img-btn .flag-img { max-width: 100%; max-height: 100%; }

  /* stavy */
  .correct { border-color: var(--ok) !important; background: var(--ok-bg) !important; }
  .wrong { border-color: var(--bad) !important; background: var(--bad-bg) !important; }
  .dim { opacity: .4; }

  /* zpětná vazba + další */
  .footer-row { display: flex; align-items: center; justify-content: center; gap: var(--gap); min-height: clamp(54px, 9vmin, 84px); }
  .feedback { font-size: clamp(18px, 3.2vmin, 36px); font-weight: 800; }
  .feedback.ok { color: var(--ok); }
  .feedback.bad { color: var(--bad); }
  .next-btn {
    font-family: inherit; font-weight: 800;
    font-size: clamp(20px, 3.4vmin, 32px);
    min-height: clamp(54px, 9vmin, 84px);
    padding: 0 clamp(24px, 4vw, 50px);
    color: var(--ink); background: var(--yellow);
    border: none; border-radius: 999px; cursor: pointer;
    box-shadow: 0 5px 0 #cfa400; flex-shrink: 0;
  }
  .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #cfa400; }
  .hidden { display: none !important; }

  /* „tajný“ režim čtení: schová všechny reproduktory (TTS), aby děti musely číst */
  body.hush .speaker { display: none !important; }
  /* krátký záblesk skóre při přepnutí režimu (zpětná vazba pro rodiče) */
  .score.flash { animation: scoreFlash .5s ease; }
  @keyframes scoreFlash { 0%,100% { transform: none; } 50% { transform: scale(1.25); filter: brightness(1.4); } }

  /* úzký mobil na výšku: jména pod sebe */
  @media (orientation: portrait) and (max-width: 560px) {
    .answers.names { grid-template-columns: 1fr; }
    .answers.images { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* ---- odměna: ohňostroj ---- */
  #fw { position: fixed; inset: 0; pointer-events: none; z-index: 50; display: none; }
  .celebrate {
    position: fixed; inset: 0; z-index: 51; pointer-events: none;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .celebrate.show { display: flex; }
  .celebrate .big {
    font-size: clamp(44px, 12vmin, 120px); font-weight: 900; color: #fff;
    text-shadow: 0 4px 0 #cfa400, 0 10px 26px rgba(0,0,0,.45);
    animation: pop-in .45s cubic-bezier(.2,1.4,.5,1);
  }
  .celebrate .sub {
    font-size: clamp(22px, 4.5vmin, 46px); font-weight: 800; color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,.5);
  }
  @keyframes pop-in { from { transform: scale(.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celebrate.small .big { font-size: clamp(36px, 9vmin, 86px); }
  .celebrate.mega .big {
    font-size: clamp(54px, 16vmin, 170px);
    animation: pop-in .45s cubic-bezier(.2,1.4,.5,1), wiggle 1.6s ease-in-out infinite .45s;
  }
  @keyframes wiggle { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
</style>

<script defer src="https://analytics.martinlutonsky.com/script.js" data-website-id="ce4e9c63-285f-4b71-abfb-a6c1ba0c63e3"></script>
</head>
<body>
  <div class="topbar">
    <button class="fs-btn" id="fsBtn" aria-label="Celá obrazovka" title="Celá obrazovka">⛶</button>
    <div class="modes">
      <button class="mode-btn active" data-mode="name">🏳️ Hádej zemi</button>
      <button class="mode-btn" data-mode="image">🚩 Hádej vlajku</button>
    </div>
    <div class="score" id="score">
      <span class="ok-s">✓ <span id="scoreRight">0</span></span>
      <span class="bad-s">✗ <span id="scoreWrong">0</span></span>
    </div>
  </div>

  <div class="stage" id="stage"></div>

  <div class="footer-row" id="footerRow">
    <span class="feedback" id="feedback"></span>
    <button class="next-btn hidden" id="nextBtn">Další ➜</button>
  </div>

  <canvas id="fw"></canvas>
  <div class="celebrate" id="celebrate">
    <div class="big">🎉 Bravo! 🎉</div>
    <div class="sub" id="celebrateSub"></div>
  </div>

<script>
// Země: ISO kód (flagcdn) + český název.
// Vybrané jen známé/větší státy – všech 27 zemí EU + známé evropské státy
// + velké/známé světové státy. Záměrně bez drobných, pro děti neznámých vlajek.
const COUNTRIES = [
// EU (27)
{c:"at",n:"Rakousko"},{c:"be",n:"Belgie"},{c:"bg",n:"Bulharsko"},{c:"hr",n:"Chorvatsko"},{c:"cy",n:"Kypr"},
{c:"cz",n:"Česko"},{c:"dk",n:"Dánsko"},{c:"ee",n:"Estonsko"},{c:"fi",n:"Finsko"},{c:"fr",n:"Francie"},
{c:"de",n:"Německo"},{c:"gr",n:"Řecko"},{c:"hu",n:"Maďarsko"},{c:"ie",n:"Irsko"},{c:"it",n:"Itálie"},
{c:"lv",n:"Lotyšsko"},{c:"lt",n:"Litva"},{c:"lu",n:"Lucembursko"},{c:"mt",n:"Malta"},{c:"nl",n:"Nizozemsko"},
{c:"pl",n:"Polsko"},{c:"pt",n:"Portugalsko"},{c:"ro",n:"Rumunsko"},{c:"sk",n:"Slovensko"},{c:"si",n:"Slovinsko"},
{c:"es",n:"Španělsko"},{c:"se",n:"Švédsko"},
// Ostatní Evropa (známé)
{c:"gb",n:"Spojené království"},{c:"no",n:"Norsko"},{c:"ch",n:"Švýcarsko"},{c:"is",n:"Island"},
{c:"ua",n:"Ukrajina"},{c:"rs",n:"Srbsko"},{c:"ru",n:"Rusko"},{c:"by",n:"Bělorusko"},
{c:"ba",n:"Bosna a Hercegovina"},{c:"al",n:"Albánie"},{c:"mk",n:"Severní Makedonie"},{c:"me",n:"Černá Hora"},
{c:"md",n:"Moldavsko"},{c:"mc",n:"Monako"},{c:"li",n:"Lichtenštejnsko"},{c:"sm",n:"San Marino"},
{c:"va",n:"Vatikán"},{c:"ad",n:"Andorra"},
// Amerika
{c:"us",n:"Spojené státy americké"},{c:"ca",n:"Kanada"},{c:"mx",n:"Mexiko"},{c:"br",n:"Brazílie"},
{c:"ar",n:"Argentina"},{c:"cl",n:"Chile"},{c:"co",n:"Kolumbie"},{c:"pe",n:"Peru"},{c:"ve",n:"Venezuela"},
{c:"cu",n:"Kuba"},
// Asie
{c:"cn",n:"Čína"},{c:"jp",n:"Japonsko"},{c:"kr",n:"Jižní Korea"},{c:"kp",n:"Severní Korea"},
{c:"in",n:"Indie"},{c:"id",n:"Indonésie"},{c:"th",n:"Thajsko"},{c:"vn",n:"Vietnam"},{c:"ph",n:"Filipíny"},
{c:"my",n:"Malajsie"},{c:"sg",n:"Singapur"},{c:"tw",n:"Tchaj-wan"},{c:"pk",n:"Pákistán"},{c:"bd",n:"Bangladéš"},
{c:"kz",n:"Kazachstán"},
// Blízký východ
{c:"tr",n:"Turecko"},{c:"il",n:"Izrael"},{c:"sa",n:"Saúdská Arábie"},{c:"ae",n:"Spojené arabské emiráty"},
{c:"qa",n:"Katar"},{c:"ir",n:"Írán"},{c:"iq",n:"Irák"},
// Afrika (velké/známé)
{c:"eg",n:"Egypt"},{c:"za",n:"Jihoafrická republika"},{c:"ng",n:"Nigérie"},{c:"ke",n:"Keňa"},
{c:"ma",n:"Maroko"},{c:"dz",n:"Alžírsko"},{c:"et",n:"Etiopie"},
// Oceánie
{c:"au",n:"Austrálie"},{c:"nz",n:"Nový Zéland"}
];

const flagUrl = i => `https://flagcdn.com/${COUNTRIES[i].c}.svg`;
const nameOf = i => COUNTRIES[i].n;
const PRAISE = ["Super!","Výborně!","Správně!","Paráda!","Jednička!"];
const TRYAGAIN = ["To nevadí","Skoro!","Zkus to znova"];

let mode = "name";
let right = 0, wrong = 0, answered = false;

const stage = document.getElementById('stage');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const scoreRight = document.getElementById('scoreRight');
const scoreWrong = document.getElementById('scoreWrong');

let lastIdx = [];
function pick(n, exclude=[]){
  const out=[];
  while(out.length<n){
    const i=Math.floor(Math.random()*COUNTRIES.length);
    if(!out.includes(i) && !exclude.includes(i)) out.push(i);
  }
  return out;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

let autoTimer = null;
function newRound(){
  clearTimeout(autoTimer);   // zruší případný automatický přechod
  answered = false;
  feedback.textContent = ""; feedback.className = "feedback";
  nextBtn.classList.add('hidden');
  const [correct,b,c] = pick(3, lastIdx);
  lastIdx = [correct,b,c];
  const options = shuffle([correct,b,c]);
  if (mode === "name") buildName(correct, options);
  else buildImage(correct, options);
}

function buildName(correct, options){
  stage.innerHTML = `
    <p class="question">Která země to je?</p>
    <div class="hero"><img class="flag-img" src="${flagUrl(correct)}" alt="" decoding="async"></div>
    <div class="answers names">
      ${options.map(i => `<div class="answer-cell">
          <button class="name-btn" data-i="${i}">${nameOf(i)}</button>
          <button class="speaker" data-say="${nameOf(i)}" aria-label="Přečíst název">🔊 <span class="lbl">Poslechni</span></button>
        </div>`).join("")}
    </div>`;
  stage.querySelectorAll('.name-btn').forEach(btn =>
    btn.addEventListener('click', () => choose(btn, +btn.dataset.i === correct, correct, '.name-btn')));
  wireSpeakers();
}

function buildImage(correct, options){
  stage.innerHTML = `
    <p class="question">Najdi vlajku:</p>
    <div class="big-name-row">
      <span class="big-name">${nameOf(correct)}</span>
      <button class="speaker" data-say="${nameOf(correct)}" aria-label="Přečíst název">🔊</button>
    </div>
    <div class="answers images">
      ${options.map(i => `<div class="img-btn" data-i="${i}"><img class="flag-img" src="${flagUrl(i)}" alt="" decoding="async"></div>`).join("")}
    </div>`;
  stage.querySelectorAll('.img-btn').forEach(btn =>
    btn.addEventListener('click', () => choose(btn, +btn.dataset.i === correct, correct, '.img-btn')));
  wireSpeakers();
}

function wireSpeakers(){
  stage.querySelectorAll('.speaker').forEach(s =>
    s.addEventListener('click', e => { e.stopPropagation(); speak(s.dataset.say); }));
}

function choose(el, isCorrect, correctIdx, sel){
  if (answered) return;
  answered = true;
  stage.querySelectorAll(sel).forEach(b => {
    if (b.tagName === 'BUTTON') b.disabled = true;
    b.classList.add('disabled');
    if (+b.dataset.i === correctIdx) b.classList.add('correct');
    else b.classList.add('dim');
  });
  if (isCorrect){
    el.classList.remove('dim'); el.classList.add('correct');
    right++; scoreRight.textContent = right;
    feedback.textContent = PRAISE[Math.floor(Math.random()*PRAISE.length)] + " 🎉";
    feedback.className = "feedback ok";
    beep(true);
    // odstupňovaná odměna (priorita 50 > 10 > 5)
    if (right % 50 === 0) celebrate('mega');
    else if (right % 10 === 0) celebrate('big');
    else if (right % 5 === 0) celebrate('small');
  } else {
    el.classList.remove('dim'); el.classList.add('wrong');
    wrong++; scoreWrong.textContent = wrong;
    feedback.textContent = TRYAGAIN[Math.floor(Math.random()*TRYAGAIN.length)] + " – je to " + nameOf(correctIdx);
    feedback.className = "feedback bad";
    beep(false);
  }
  nextBtn.classList.remove('hidden');
  autoTimer = setTimeout(newRound, 3000);   // po 3 s přejde samo na další
}

nextBtn.addEventListener('click', newRound);

// ---- čtení názvu nahlas (česky) ----
let voices = [];
function loadVoices(){ try { voices = speechSynthesis.getVoices() || []; } catch(e){} }
if ('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text){
  if (hush) return;                 // tichý režim: nečteme nahlas
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'cs-CZ';
  u.rate = 0.85;
  const v = voices.find(x => /cs([-_]CZ)?/i.test(x.lang));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

let actx;
function beep(ok){
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination); g.gain.value = 0.06;
    if (ok){ o.frequency.setValueAtTime(660, actx.currentTime); o.frequency.setValueAtTime(990, actx.currentTime+0.1); }
    else { o.frequency.setValueAtTime(300, actx.currentTime); o.frequency.setValueAtTime(180, actx.currentTime+0.12); }
    o.start(); o.stop(actx.currentTime + 0.22);
  } catch(e){}
}

function fanfare(notes){
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    notes.forEach((f, i) => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = "triangle"; o.frequency.value = f;
      o.connect(g); g.connect(actx.destination);
      const t = actx.currentTime + i * 0.13;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.13, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
      o.start(t); o.stop(t + 0.37);
    });
  } catch(e){}
}

// ---- ohňostroj (odstupňovaná odměna) ----
const PARTY = {
  small: { dur: 1500, spawnEvery: 420, burst: 26, title: "⭐ Super! ⭐",     notes: [659, 988] },
  big:   { dur: 2800, spawnEvery: 320, burst: 50, title: "🎉 Bravo! 🎉",     notes: [523, 659, 784, 1047] },
  mega:  { dur: 5400, spawnEvery: 180, burst: 70, title: "🏆 PARÁDA!!! 🏆",  notes: [523, 659, 784, 1047, 880, 1047, 1319, 1568] }
};

const fw = document.getElementById('fw');
const fwCtx = fw.getContext('2d');
const celebrateEl = document.getElementById('celebrate');
const celebrateBig = celebrateEl.querySelector('.big');
const celebrateSub = document.getElementById('celebrateSub');
let particles = [], fwRAF = null, fwEnd = 0, lastSpawn = 0, fwSpawnEvery = 320, fwBurst = 50;

function sizeFw(){ fw.width = innerWidth; fw.height = innerHeight; }
addEventListener('resize', sizeFw);

function burst(x, y, size){
  const n = size + Math.floor(Math.random() * 30);
  const hue = Math.floor(Math.random() * 360);
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5.5;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, life: 1, hue: hue + Math.random()*40 });
  }
}

function fwLoop(t){
  fwCtx.clearRect(0, 0, fw.width, fw.height);
  if (t < fwEnd && t - lastSpawn > fwSpawnEvery){
    burst(fw.width*(0.12 + Math.random()*0.76), fw.height*(0.1 + Math.random()*0.5), fwBurst);
    lastSpawn = t;
  }
  particles.forEach(p => {
    p.vy += 0.05; p.vx *= 0.99; p.vy *= 0.99;
    p.x += p.vx; p.y += p.vy; p.life -= 0.012;
  });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    fwCtx.globalAlpha = Math.max(0, p.life);
    fwCtx.fillStyle = `hsl(${p.hue},100%,60%)`;
    fwCtx.beginPath(); fwCtx.arc(p.x, p.y, 3.2, 0, Math.PI*2); fwCtx.fill();
  });
  fwCtx.globalAlpha = 1;
  if (t < fwEnd || particles.length){ fwRAF = requestAnimationFrame(fwLoop); }
  else { fw.style.display = 'none'; fwCtx.clearRect(0, 0, fw.width, fw.height); }
}

function celebrate(level){
  const cfg = PARTY[level] || PARTY.big;
  sizeFw();
  fw.style.display = 'block';
  celebrateBig.textContent = cfg.title;
  celebrateSub.textContent = right + " správně! 🌟";
  celebrateEl.className = 'celebrate show ' + level;
  fanfare(cfg.notes);
  fwSpawnEvery = cfg.spawnEvery; fwBurst = cfg.burst;
  fwEnd = performance.now() + cfg.dur; lastSpawn = 0;
  burst(fw.width*0.3, fw.height*0.4, cfg.burst);
  burst(fw.width*0.7, fw.height*0.35, cfg.burst);
  if (fwRAF) cancelAnimationFrame(fwRAF);
  fwRAF = requestAnimationFrame(fwLoop);
  setTimeout(() => celebrateEl.classList.remove('show'), cfg.dur);
}

document.querySelectorAll('.mode-btn').forEach(b =>
  b.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
    newRound();
  }));

// ---- celá obrazovka ----
const fsBtn = document.getElementById('fsBtn');
function isFullscreen(){ return document.fullscreenElement || document.webkitFullscreenElement; }
function toggleFullscreen(){
  const el = document.documentElement;
  if (!isFullscreen()){
    (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
  }
}
function syncFsIcon(){ fsBtn.textContent = isFullscreen() ? '✕' : '⛶'; }
fsBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', syncFsIcon);
document.addEventListener('webkitfullscreenchange', syncFsIcon);

// ---- „tajný“ režim čtení: trojklik na skóre skryje/zobrazí TTS ----
// Zapamatuje se v localStorage, aby ho restart stránky neobešel.
let hush = false;
try { hush = localStorage.getItem('fg_hush') === '1'; } catch(e){}
function applyHush(){ document.body.classList.toggle('hush', hush); }
applyHush();

const scoreEl = document.getElementById('score');
let clickTimer = null, clickCount = 0;
scoreEl.addEventListener('click', () => {
  clickCount++;
  clearTimeout(clickTimer);
  if (clickCount >= 3){
    clickCount = 0;
    hush = !hush;
    try { localStorage.setItem('fg_hush', hush ? '1' : '0'); } catch(e){}
    if (hush) { try { speechSynthesis.cancel(); } catch(e){} }
    applyHush();
    scoreEl.classList.remove('flash'); void scoreEl.offsetWidth; scoreEl.classList.add('flash');
  } else {
    clickTimer = setTimeout(() => { clickCount = 0; }, 600);
  }
});

newRound();
</script>
